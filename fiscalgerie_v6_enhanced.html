═══════════════════════════════════════════════════════ */

const LS_KEY = "fiscalgerie_cfg_v6";

/* ── DEFAULT CONFIG ── */
const DEFAULT_CFG = {
  ifu_min_std:30000, ifu_min_micro:10000,
  ifu_rate_prod:5, ifu_rate_serv:12, ifu_rate_micro:0.5,
  ibs_rate_prod:19, ibs_rate_btp:23, ibs_rate_trade:26,
  tva_normal:19, tva_reduced:9,
  acompte_goods:2, acompte_services:4,
  bnc_rate:19, bnc_min:10000,
  irg:[
    {max:240000,rate:0},{max:480000,rate:23},{max:960000,rate:27},
    {max:1920000,rate:30},{max:3840000,rate:33},{max:Infinity,rate:35},
  ],
};
function cloneCfg(c){return{...c,irg:c.irg.map(b=>({...b}))};}

/* ── LOAD / SAVE CONFIG ── */
function loadCfg(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return cloneCfg(DEFAULT_CFG);
    const saved=JSON.parse(raw);
    /* merge so new keys from DEFAULT are always present */
    const merged=cloneCfg(DEFAULT_CFG);
    Object.keys(merged).forEach(k=>{
      if(k==="irg"){
        if(Array.isArray(saved.irg)&&saved.irg.length===merged.irg.length)
          merged.irg=saved.irg.map(b=>({...b}));
      } else if(saved[k]!==undefined) merged[k]=saved[k];
    });
    return merged;
  }catch(e){return cloneCfg(DEFAULT_CFG);}
}
function saveCfg(c){
  try{
    const ser=cloneCfg(c);
    ser.irg=c.irg.map(b=>({...b,max:b.max===Infinity?"Infinity":b.max}));
    localStorage.setItem(LS_KEY,JSON.stringify(ser));
  }catch(e){}
}

/* ─── EXPENSE CHECKLIST TOTAL ─── */
function expTotal(){
  let total=0;
  const cats=d().dir==="rtl"?EXPENSE_CATS_AR:EXPENSE_CATS_FR;
  cats.forEach(cat=>{
    if(S.expChecked[cat.id]){
      const v=parseFloat(S.expAmounts[cat.id]||0);
      if(!isNaN(v)&&v>0) total+=v;
    }
  });
  return total;
}

/* ─── IRG CALC ─── */
function calcIRG(profit){
  const brackets=cfg().irg;
  let tax=0,prev=0,details=[];
  for(const b of brackets){
    if(profit<=prev) break;
    const safeMax=b.max===Infinity?profit*100:b.max;
    const slice=Math.min(profit,safeMax)-prev;
    const piece=slice*(b.rate/100);
    details.push({label:b.max===Infinity?"∞":fmt(b.max).replace(" DA",""),slice,rate:b.rate,tax:piece});
    tax+=piece; prev=safeMax;
    if(b.max===Infinity) break;
  }
  return{tax,details};
}

/* ─── CALCULATORS ─── */
function doIFU(){
  const st=S.ifu,c=cfg();
  const v=pf(st.ca);
  if(isNaN(v)||v<0){st.err=d().errPos;st.res=null;return render();}
  st.err="";
  const act=ifuActs().find(a=>a.v===st.act);
  const MIN=act.micro?c.ifu_min_micro:c.ifu_min_std;
  const raw=v*act.r,final=Math.max(raw,MIN);
  st.res={ca:v,rate:act.r,raw,final,minApplied:raw<MIN,isMicro:act.micro,minAmt:MIN};
  render();
}
function doReel(){
  const st=S.reel,c=cfg();
  const gr=pf(st.gross),ex=pf(st.exp);
  if(isNaN(gr)||gr<0){st.err=d().errPos;st.res=null;return render();}
  const expenses=isNaN(ex)?0:ex;
  st.err="";
  if(st.sector==="export"){st.res={mode:"export",gr,expenses,profit:gr-expenses};return render();}
  let acompteAmt=null;
  if(st.sector==="import"){
    acompteAmt=gr*(st.acompteType==="goods"?c.acompte_goods/100:c.acompte_services/100);
  }
  const profit=gr-expenses;
  if(profit<0){st.res={mode:"loss",profit,gr,expenses,acompteAmt};return render();}
  let taxRaw=0,ibsRate=0,irgDetails=null;
  if(st.entity==="company"){
    const act=ibsActs().find(a=>a.v===st.ibsAct);
    ibsRate=act.r; taxRaw=profit*ibsRate;
  } else {
    const{tax,details}=calcIRG(profit);
    taxRaw=tax; irgDetails=details;
  }
  const final=Math.max(taxRaw,c.ifu_min_std);
  let tvaAmt=null;
  if(st.tva){tvaAmt=gr*(st.tvaRate==="normal"?c.tva_normal/100:c.tva_reduced/100);}
  st.res={mode:"normal",gr,expenses,profit,ibsRate,taxRaw,final,
          minApplied:taxRaw<c.ifu_min_std,irgDetails,tvaAmt,acompteAmt,entity:st.entity};
  render();
}
function doSimp(){
  const st=S.simp,c=cfg();
  const rec=pf(st.rec),ex=pf(st.exp);
  if(isNaN(rec)||rec<0){st.err=d().errPos;st.res=null;return render();}
  const expenses=isNaN(ex)?0:ex;
  st.err="";
  const profit=Math.max(rec-expenses,0);
  const raw=profit*(c.bnc_rate/100),final=Math.max(raw,c.bnc_min);
  st.res={rec,expenses,profit,raw,final,minApplied:raw<c.bnc_min};
  render();
}

/* ─── SETTINGS ACTIONS ─── */
function applySettings(){
  const keys=["ifu_min_std","ifu_min_micro","ifu_rate_prod","ifu_rate_serv","ifu_rate_micro",
              "ibs_rate_prod","ibs_rate_btp","ibs_rate_trade","tva_normal","tva_reduced",
              "acompte_goods","acompte_services","bnc_rate","bnc_min"];
  for(const k of keys){
    const el=$("cfg_"+k); if(!el) continue;
    const v=parseFloat(el.value);
    if(!isNaN(v)&&v>=0) S.edit[k]=v;
  }
  S.edit.irg.forEach((_,i)=>{
    const maxEl=$("irg_max_"+i),rateEl=$("irg_rate_"+i);
    if(rateEl){const rv=parseFloat(rateEl.value);if(!isNaN(rv)&&rv>=0)S.edit.irg[i].rate=rv;}
    if(maxEl&&i<S.edit.irg.length-1){const mv=parseFloat(maxEl.value);if(!isNaN(mv)&&mv>0)S.edit.irg[i].max=mv;}
  });
  S.cfg=cloneCfg(S.edit);
  saveCfg(S.cfg);
  [S.ifu,S.reel,S.simp].forEach(m=>{m.res=null;});
  S.settingsSaved=true;
  render();
  setTimeout(()=>{S.settingsSaved=false;render();},3000);
}
function resetSettings(){
  S.cfg=cloneCfg(DEFAULT_CFG); S.edit=cloneCfg(DEFAULT_CFG);
  saveCfg(S.cfg);
  [S.ifu,S.reel,S.simp].forEach(m=>{m.res=null;m.err="";});
  S.expChecked={}; S.expAmounts={};
  render();
}

function openReport(){
  const t=d(),c=cfg();
  const now=new Date().toLocaleDateString(S.lang==="ar"?"ar-DZ":"fr-FR",{year:"numeric",month:"long",day:"numeric"});

  const sections=[];

  /* IFU */
  if(S.ifu.res){
    const r=S.ifu.res;
    sections.push({
      module:"IFU — "+t.ifuTitle, color:"#1D9E75",
      rows:[
        [t.lCA, fmt(r.ca)],
        [t.lRate, (r.rate*100).toFixed(2)+"%"],
        [t.lRaw, fmt(r.raw)],
        [t.lMin, fmt(r.minAmt)],
        [t.lFinal, fmt(r.final)],
      ],
      note:r.minApplied?(r.isMicro?t.minMicroNote:t.minStdNote):"",
    });
  }

  /* Réel */
  if(S.reel.res){
    const r=S.reel.res;
    const rows=[[t.lRevenue,fmt(r.gr)],[t.lExp,fmt(r.expenses)],[t.lProfit,fmt(r.profit)]];
    if(r.mode==="export") rows.push([t.exportZero,"0 DA"]);
    else if(r.mode==="loss") rows.push([t.lossTitle,"—"]);
    else {
      rows.push([t.lTaxRaw,fmt(r.taxRaw)]);
      if(r.tvaAmt!=null) rows.push([t.lTvaEst,fmt(r.tvaAmt)]);
      if(r.acompteAmt!=null) rows.push([t.lAcompte,fmt(r.acompteAmt)]);
      rows.push([t.lFinalTax,fmt(r.final)]);
    }
    sections.push({module:"IBS/IRG — "+t.reelTitle,color:"#378ADD",rows,note:""});
  }

  /* BNC */
  if(S.simp.res){
    const r=S.simp.res;
    sections.push({
      module:"BNC — "+t.simpTitle, color:"#854F0B",
      rows:[[t.lRec,fmt(r.rec)],[t.lSimpExp,fmt(r.expenses)],[t.lNet,fmt(r.profit)],[t.lSimpRate,c.bnc_rate+"%"],[t.lSimpFinal,fmt(r.final)]],
      note:r.minApplied?t.simpMinNote:"",
    });
  }

  if(!sections.length){
    alert(S.lang==="ar"?"يرجى إجراء حساب أولاً في أحد الوحدات.":"Veuillez d'abord effectuer un calcul dans au moins un module.");
    return;
  }

  const html=`
  <div style="font-family:${t.ff};direction:${t.dir};color:#111;">
    <div style="text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #1D9E75;">
      <div style="font-size:10px;color:#999;margin-bottom:4px;">FiscAlgérie · ${t.reportGenerated} : ${now}</div>
      <h1 style="font-size:20px;font-weight:700;color:#0F6E56;">${t.reportTitle}</h1>
    </div>
    ${sections.map(sec=>`
      <div style="margin-bottom:1.25rem;border-radius:10px;border:1px solid #e8e6e1;overflow:hidden;">
        <div style="background:${sec.color};color:#fff;padding:9px 14px;font-size:13px;font-weight:600;">${sec.module}</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          ${sec.rows.map(([l,v],i)=>`
          <tr style="background:${i%2===0?"#fafaf8":"#fff"};">
            <td style="padding:8px 14px;color:#555;width:60%;">${l}</td>
            <td style="padding:8px 14px;font-weight:600;font-family:'DM Mono',monospace;text-align:end;color:#111;">${v}</td>
          </tr>`).join("")}
        </table>
        ${sec.note?`<div style="padding:8px 14px;background:#FAEEDA;font-size:11px;color:#633806;">⚠ ${sec.note}</div>`:""}
      </div>`).join("")}
    <div style="margin-top:1.5rem;padding:10px 14px;background:#f8f7f4;border-radius:8px;font-size:11px;color:#999;text-align:center;">${t.reportFooter}</div>
  </div>`;

  $("report-content").innerHTML=html;
  $("report-modal").classList.add("open");
}

function downloadReport(){
  const content=$("report-content").innerHTML;
  const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>FiscAlgérie Report</title>
  <style>body{font-family:sans-serif;padding:2rem;max-width:700px;margin:auto;}table{width:100%;border-collapse:collapse;}td{padding:8px 14px;}</style>
  </head><body>${content}</body></html>`;

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="FiscAlgerie_Rapport.html";

}

function roadmap(title,steps){
  return`<div style="background:#fff;border-radius:12px;border:1px solid #e8e6e1;padding:1.1rem;margin-top:1rem;">
    <h2 style="font-size:13px;font-weight:600;color:#111;margin-bottom:.9rem;">${title}</h2>
    <div class="g2h">
      ${steps.map((s,i)=>`<div class="scard">
        <div style="width:32px;height:32px;border-radius:8px;background:${s.c}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="ti ${s.icon}" style="font-size:15px;color:${s.c};"></i>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#222;margin-bottom:2px;">
            <span style="font-size:9px;font-weight:700;color:${s.c};margin-inline-end:4px;">0${i+1}</span>${s.title}
          </div>
          <p style="font-size:11px;color:#666;line-height:1.55;">${s.desc}</p>
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}

const cfgField=(id,label,val,unit="")=>`
  <div>
    <label style="display:block;font-size:11px;color:#666;margin-bottom:3px;line-height:1.4;">${label}</label>
    <div style="position:relative;">
      <input id="${id}" type="number" min="0" step="any" value="${val}" class="cfg-input"
        style="padding-inline-end:${unit?"26px":"10px"};">
      ${unit?`<span style="position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#999;pointer-events:none;">${unit}</span>`:""}
    </div>
  </div>`;

const cfgBlock=(title,color,rows)=>`
  <div style="background:#fff;border-radius:10px;border:1px solid #e8e6e1;padding:1rem;margin-bottom:.75rem;">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:.85rem;">
      <div style="width:3px;height:18px;background:${color};border-radius:2px;flex-shrink:0;"></div>
      <h3 style="font-size:12px;font-weight:600;color:#222;">${title}</h3>
    </div>
    <div class="g3">${rows}</div>
  </div>`;

/* ════════════════════════════════════
   EXPENSE CHECKLIST RENDERER (partial re-render)
════════════════════════════════════ */
function renderExpChecklist(){
  const container=$("exp-checklist-container");
  if(!container) return;
  const t=d();
  const cats=t.dir==="rtl"?EXPENSE_CATS_AR:EXPENSE_CATS_FR;
  const total=expTotal();
  const checkedCount=cats.filter(c=>S.expChecked[c.id]).length;

  container.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;flex-wrap:wrap;gap:6px;">
      <span style="font-size:11px;color:#888;">${checkedCount} ${t.dir==="rtl"?"عنصر محدد":"élément(s) coché(s)"}</span>
      <button class="cbtn" onclick="resetExp()" style="padding:4px 10px;border-radius:6px;border:1px solid #ddd;background:#fafaf8;font-size:11px;color:#666;font-family:inherit;">
        <i class="ti ti-refresh" style="font-size:11px;"></i> ${t.expCheckReset}
      </button>
    </div>
    <div style="max-height:280px;overflow-y:auto;padding-inline-end:2px;">
      ${cats.map(cat=>`
      <div class="exp-row">
        <input type="checkbox" id="exp_${cat.id}" ${S.expChecked[cat.id]?"checked":""}
          onchange="toggleExp('${cat.id}')">
        <i class="ti ${cat.icon}" style="font-size:14px;color:${S.expChecked[cat.id]?"#1D9E75":"#bbb"};flex-shrink:0;transition:color .15s;"></i>
        <label for="exp_${cat.id}" style="flex:1;font-size:12px;color:${S.expChecked[cat.id]?"#222":"#666"};cursor:pointer;line-height:1.4;">${cat.label}</label>
        ${S.expChecked[cat.id]?`
        <input type="number" class="exp-amt" min="0" step="1000"
          placeholder="0" value="${S.expAmounts[cat.id]||""}"
          oninput="setExpAmt('${cat.id}',this.value)">`
        :`<span style="width:110px;font-size:11px;color:#ddd;text-align:end;padding-inline-end:6px;">—</span>`}
      </div>`).join("")}
    </div>
    <div style="margin-top:.85rem;border-top:1.5px solid #e8e6e1;padding-top:.85rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">
        <span style="font-size:13px;font-weight:600;color:#222;">${t.expCheckTotal}</span>
        <span style="font-size:15px;font-weight:700;color:#1D9E75;font-family:'DM Mono',monospace;">${fmt(total)}</span>
      </div>
      <button class="cbtn" onclick="applyExpToReel()"
        style="width:100%;padding:9px;border-radius:8px;border:none;background:#1D9E75;color:#fff;
               font-size:12px;font-weight:600;font-family:inherit;">
        <i class="ti ti-arrow-right" style="font-size:13px;"></i> ${t.expCheckApply}
      </button>
    </div>`;
}

function panelIFU(){
  const t=d(),st=S.ifu,c=cfg();
  const acts=ifuActs(),act=acts.find(a=>a.v===st.act);
  const minAmt=act.micro?c.ifu_min_micro:c.ifu_min_std;

  const left=`
    <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.params}</div>
    <div style="margin-bottom:.85rem;">${pLabel(t.caLbl)}${pInput("ifu-ca",st.ca,t.caPh,st.err)}</div>
    <div style="margin-bottom:.85rem;">
      ${pLabel(t.actLbl)}
      <select id="ifu-act" style="width:100%;padding:9px 11px;border-radius:7px;border:1px solid #ddd;font-size:12px;background:#fafaf8;color:#111;font-family:inherit;">
        ${acts.map(a=>`<option value="${a.v}" ${st.act===a.v?"selected":""}>${a.l}</option>`).join("")}
      </select>
    </div>
    <div style="background:#e1f5ee;border-radius:7px;padding:8px 12px;margin-bottom:.5rem;display:flex;align-items:center;gap:9px;">
      <span style="font-size:18px;font-weight:700;color:#0F6E56;font-family:'DM Mono',monospace;">${(act.r*100).toFixed(2).replace(/\.?0+$/,"")}%</span>
      <span style="font-size:11px;color:#0F6E56;">${t.rateHint}</span>
    </div>
    <div style="background:#f0f8ff;border-radius:7px;padding:7px 11px;margin-bottom:.9rem;border-inline-start:3px solid ${act.micro?"#BA7517":"#A32D2D"};">
      <p style="font-size:11px;color:${act.micro?"#633806":"#791F1F"};font-weight:500;">Min: ${fmt(minAmt)}</p>
    </div>
    <button class="cbtn" onclick="doIFU()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;font-family:inherit;">${t.calcBtn}</button>`;

  const right=st.res?`
    <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.results}</div>
    ${rrow(t.lCA,fmt(st.res.ca))}${rrow(t.lRate,(st.res.rate*100).toFixed(2)+"%")}${rrow(t.lRaw,fmt(st.res.raw))}${rrow(t.lMin,fmt(minAmt))}
    ${finalBox(t.lFinal,fmt(st.res.final))}
    ${st.res.minApplied?warnBox(st.res.isMicro?t.minMicroNote:t.minStdNote):""}
  `:null;

  return`
    ${secHead(t.ifuBadge,"#1D9E75",t.ifuSub,t.ifuTitle,t.ifuDesc)}
    <div class="g2" style="margin-bottom:.5rem;">
      <div style="background:#fff;border-radius:12px;border:1px solid #e8e6e1;padding:1.1rem;">${left}</div>
      ${right?`<div style="background:#fff;border-radius:12px;border:1.5px solid #1D9E75;padding:1.1rem;">${right}</div>`:emptyState("ti-calculator",t.emptyHint)}
    </div>
    ${roadmap(t.ifuRoadTitle,t.ifuRoad)}`;
}

function panelReel(){
  const t=d(),st=S.reel,c=cfg();
  const acts=ibsActs();

  const importBlock=st.sector==="import"?`
    <div style="background:#FCEBEB;border-radius:8px;padding:10px 12px;border:1px solid #F7C1C1;margin-bottom:.85rem;">
      <p style="font-size:11px;font-weight:700;color:#A32D2D;margin-bottom:3px;">${t.importAlertTitle}</p>
      <p style="font-size:11px;color:#791F1F;line-height:1.55;">${t.importAlertMsg}</p>
    </div>
    <div style="margin-bottom:.85rem;">
      ${pLabel(t.acompteTypeLbl)}
      ${segGroup([{v:"goods",l:`${t.acompteGoods} (${c.acompte_goods}%)`},{v:"services",l:`${t.acompteServices} (${c.acompte_services}%)`}],st.acompteType,"setAcompteType","#A32D2D")}
    </div>
    <div style="background:#FAEEDA;border-radius:8px;padding:9px 12px;border:1px solid #FAC775;margin-bottom:.85rem;">
      <p style="font-size:11px;font-weight:600;color:#633806;margin-bottom:2px;">${t.importTipTitle}</p>
      <p style="font-size:11px;color:#633806;line-height:1.5;">${t.importTipMsg}</p>
    </div>`:"";

  const entityBlock=st.sector!=="export"?`
    <div style="margin-bottom:.85rem;">${pLabel(t.entityLbl)}${segGroup(t.entities,st.entity,"setEntity","#378ADD")}</div>
    ${st.entity==="company"?`<div style="margin-bottom:.85rem;">${pLabel(t.ibsLbl)}
      <select id="reel-ibsact" style="width:100%;padding:9px 11px;border-radius:7px;border:1px solid #ddd;font-size:12px;background:#fafaf8;color:#111;font-family:inherit;">
        ${acts.map(a=>`<option value="${a.v}" ${st.ibsAct===a.v?"selected":""}>${a.l}</option>`).join("")}
      </select></div>`:""}
    <div style="margin-bottom:.85rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:12px;font-weight:500;color:#444;">${t.tvaLbl}</span>
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555;cursor:pointer;">
          <input type="checkbox" ${st.tva?"checked":""} onchange="toggleTVA(this.checked)" style="width:13px;height:13px;">
          ${t.tvaToggle}
        </label>
      </div>
      ${st.tva?segGroup([{v:"normal",l:`${t.dir==="rtl"?"عادي":"Normal"} ${c.tva_normal}%`},{v:"reduced",l:`${t.dir==="rtl"?"مخفض":"Réduit"} ${c.tva_reduced}%`}],st.tvaRate,"setTvaRate","#378ADD"):""}
    </div>`:"";

  /* ── EXPENSE CHECKLIST WIDGET ── */
  const expWidget=`
    <div style="background:#fff;border-radius:12px;border:1.5px solid #1D9E75;padding:1.1rem;margin-top:.85rem;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.6rem;">
        <i class="ti ti-checklist" style="font-size:16px;color:#1D9E75;"></i>
        <h3 style="font-size:13px;font-weight:600;color:#0F6E56;">${t.expCheckTitle}</h3>
      </div>
      <p style="font-size:11px;color:#666;line-height:1.55;margin-bottom:.85rem;">${t.expCheckDesc}</p>
      <div style="background:#FAEEDA;border-radius:7px;padding:7px 10px;margin-bottom:.85rem;">
        <p style="font-size:11px;color:#633806;">${t.expCheckTip}</p>
      </div>
      <div id="exp-checklist-container"></div>
    </div>`;

  const left=`
    <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.params}</div>
    <div style="margin-bottom:.85rem;">${pLabel(t.grossLbl)}${pInput("reel-gross",st.gross,t.grossPh,st.err)}</div>
    <div style="margin-bottom:.85rem;">${pLabel(t.expLbl)}${pInput("reel-exp",st.exp,t.expPh,"")}</div>
    <div style="margin-bottom:.85rem;">${pLabel(t.sectorLbl)}${segGroup(t.sectors,st.sector,"setSector","#378ADD")}</div>
    ${importBlock}${entityBlock}
    <button class="cbtn" onclick="doReel()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#378ADD;color:#fff;font-size:13px;font-weight:600;font-family:inherit;">${t.calcReelBtn}</button>`;

  let right=null,resBorder="1.5px solid #378ADD";
  if(st.res){
    const r=st.res;
    if(r.mode==="export"){
      resBorder="1.5px solid #1D9E75";
      right=`
        <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.results}</div>
        ${rrow(t.lRevenue,fmt(r.gr))}${rrow(t.lExp,fmt(r.expenses))}${rrow(t.lProfit,fmt(r.profit))}
        <div style="margin-top:.8rem;background:#e1f5ee;border-radius:9px;padding:12px 14px;border:1.5px solid #1D9E75;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
            <i class="ti ti-circle-check" style="font-size:18px;color:#0F6E56;"></i>
            <span style="font-size:12px;font-weight:700;color:#0F6E56;">${t.exportZero}</span>
          </div>
          <p style="font-size:11px;color:#0F6E56;line-height:1.6;">${t.exportMsg}</p>
        </div>`;
    } else if(r.mode==="loss"){
      resBorder="1.5px solid #E24B4A";
      right=`
        <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.results}</div>
        <div style="background:#FCEBEB;border-radius:8px;padding:12px 13px;border:1px solid #F7C1C1;">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;">
            <i class="ti ti-trending-down" style="font-size:17px;color:#A32D2D;"></i>
            <span style="font-size:12px;font-weight:600;color:#A32D2D;">${t.lossTitle}</span>
          </div>
          <p style="font-size:11px;color:#791F1F;line-height:1.55;">${t.lossMsg}</p>
          ${rrow(t.lRevenue,fmt(r.gr))}${rrow(t.lExp,fmt(r.expenses))}
          <div class="rrow" style="border:none;">
            <span style="font-size:12px;font-weight:600;color:#A32D2D;">${t.lProfit}</span>
            <span style="font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:#A32D2D;">${fmt(r.profit)}</span>
          </div>
        </div>
        ${r.acompteAmt!=null?rrow(`<span style="color:#A32D2D;">${t.lAcompte}</span>`,fmt(r.acompteAmt),"#A32D2D"):""}`;
    } else {
      right=`
        <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.results}</div>
        ${rrow(t.lRevenue,fmt(r.gr))}${rrow(t.lExp,fmt(r.expenses))}${rrow(t.lProfit,fmt(r.profit))}
        ${rrow(t.lTaxRate,r.entity==="company"?(r.ibsRate*100).toFixed(0)+"%":"IRG progressif")}
        ${rrow(t.lTaxRaw,fmt(r.taxRaw))}
        ${r.tvaAmt!=null?rrow(`<span style="color:#378ADD;">${t.lTvaEst}</span>`,fmt(r.tvaAmt),"#378ADD"):""}
        ${r.acompteAmt!=null?rrow(`<span style="color:#A32D2D;">${t.lAcompte}</span>`,fmt(r.acompteAmt),"#A32D2D"):""}
        ${finalBox(t.lFinalTax,fmt(r.final))}
        ${r.minApplied?warnBox(t.minStdNote):""}
        ${r.irgDetails?`
          <div style="margin-top:.85rem;">
            <div style="font-size:10px;font-weight:600;color:#888;margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase;">${t.irgBreakTitle}</div>
            ${r.irgDetails.filter(x=>x.slice>0).map(x=>`
            <div style="display:flex;justify-content:space-between;padding:4px 8px;border-radius:5px;background:#f8f7f4;margin-bottom:2px;">
              <span style="font-size:10px;color:#666;">${x.label}</span>
              <span style="font-size:10px;font-family:'DM Mono',monospace;color:${x.rate===0?"#1D9E75":"#333"};">${x.rate===0?t.exonere:fmt(x.tax)}</span>
            </div>`).join("")}
          </div>`:""}`;
    }
  }

  return`
    ${secHead(t.reelBadge,"#378ADD",t.reelSub,t.reelTitle,t.reelDesc)}
    <div class="g2" style="margin-bottom:.5rem;">
      <div>
        <div style="background:#fff;border-radius:12px;border:1px solid #e8e6e1;padding:1.1rem;">${left}</div>
        ${expWidget}
      </div>
      ${right?`<div style="background:#fff;border-radius:12px;border:${resBorder};padding:1.1rem;overflow-y:auto;">${right}</div>`:emptyState("ti-report-analytics",t.emptyHint)}
    </div>
    <!-- Report button row -->
    <div style="display:flex;justify-content:flex-end;margin-top:.6rem;margin-bottom:.2rem;">
      <button class="cbtn" onclick="openReport()"
        style="padding:9px 18px;border-radius:8px;border:none;background:#334155;color:#fff;
               font-size:12px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:6px;">
        <i class="ti ti-file-download" style="font-size:14px;"></i>
        ${t.dir==="rtl"?"تنزيل التقرير":"Rapport & Téléchargement"}
      </button>
    </div>
    ${roadmap(t.reelRoadTitle,t.reelRoad)}`;
}

function panelSimp(){
  const t=d(),st=S.simp,c=cfg();

  const left=`
    <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.params}</div>
    <div style="margin-bottom:.85rem;">${pLabel(t.recLbl)}${pInput("simp-rec",st.rec,t.recPh,st.err)}</div>
    <div style="margin-bottom:.85rem;">${pLabel(t.simpExpLbl)}${pInput("simp-exp",st.exp,t.simpExpPh,"")}</div>
    <div style="background:#f0e9d2;border-radius:7px;padding:9px 12px;margin-bottom:.9rem;display:flex;align-items:center;gap:9px;">
      <span style="font-size:18px;font-weight:700;color:#633806;font-family:'DM Mono',monospace;">${c.bnc_rate}%</span>
      <span style="font-size:11px;color:#854F0B;">${t.lSimpRate} · Min: ${fmt(c.bnc_min)}</span>
    </div>
    <button class="cbtn" onclick="doSimp()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#854F0B;color:#fff;font-size:13px;font-weight:600;font-family:inherit;">${t.simpCalcBtn}</button>`;

  const right=st.res?`
    <div style="font-size:10px;font-weight:600;color:#999;margin-bottom:.9rem;letter-spacing:.8px;text-transform:uppercase;">${t.results}</div>
    ${rrow(t.lRec,fmt(st.res.rec))}${rrow(t.lSimpExp,fmt(st.res.expenses))}${rrow(t.lNet,fmt(st.res.profit))}${rrow(t.lSimpRate,c.bnc_rate+"%")}
    ${finalBox(t.lSimpFinal,fmt(st.res.final),"#633806","#FAC775")}
    ${st.res.minApplied?warnBox(t.simpMinNote):""}`:null;

  const focus=`
    <div style="background:#fff;border-radius:12px;border:1.5px solid #5DCAA5;padding:1.25rem;margin-top:1rem;">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:9px;margin-bottom:.85rem;">
        <span class="tag" style="background:#1D9E75;color:#fff;">FOCUS</span>
        <h2 style="font-size:14px;font-weight:600;color:#0F6E56;">${t.focusTitle}</h2>
        <span style="font-size:10px;color:#aaa;">${t.focusSub}</span>
      </div>
      <p style="font-size:12px;color:#555;line-height:1.6;margin-bottom:.9rem;">${t.focusDesc}</p>
      <div style="margin-bottom:.9rem;">
        <div style="font-size:10px;font-weight:600;color:#888;letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px;">${t.focusProfsLbl}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;">
          ${t.focusProfs.map(p=>`<span style="background:#e1f5ee;color:#0F6E56;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:500;">${p}</span>`).join("")}
        </div>
      </div>
      <div class="g2h">
        ${t.focusSteps.map((s,i)=>`
        <div style="${i===4?"grid-column:1/-1;":""}display:flex;gap:10px;padding:11px;background:#fafaf8;border-radius:9px;border:1px solid #eee;">
          <div style="width:32px;height:32px;border-radius:8px;background:${s.c}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="ti ${s.icon}" style="font-size:15px;color:${s.c};"></i>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:#222;margin-bottom:2px;">
              <span style="font-size:9px;font-weight:700;color:${s.c};margin-inline-end:4px;">0${i+1}</span>${s.title}
            </div>
            <p style="font-size:11px;color:#666;line-height:1.55;">${s.desc}</p>
          </div>
        </div>`).join("")}
      </div>
    </div>`;

  return`
    ${secHead(t.simpBadge,"#854F0B",t.simpSub,t.simpTitle,t.simpDesc)}
    <div class="g2" style="margin-bottom:.5rem;">
      <div style="background:#fff;border-radius:12px;border:1px solid #e8e6e1;padding:1.1rem;">${left}</div>
      ${right?`<div style="background:#fff;border-radius:12px;border:1.5px solid #854F0B;padding:1.1rem;">${right}</div>`:emptyState("ti-chart-line",t.emptyHint)}
    </div>
    ${roadmap(t.simpRoadTitle,t.simpRoad)}
    ${focus}`;
}

/* ════════════════════════════════════
   MAIN RENDER
════════════════════════════════════ */
function render(){
  const t=d(),app=document.getElementById("app");
  app.dir=t.dir; app.style.fontFamily=t.ff; app.style.minHeight="100vh"; app.style.background="#f8f7f4";
  const cfgChanged=JSON.stringify(S.cfg)!==JSON.stringify(DEFAULT_CFG);

  app.innerHTML=`
  <header style="background:#fff;border-bottom:1px solid #e8e6e1;position:sticky;top:0;z-index:50;">
    <div style="max-width:980px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:54px;gap:10px;">
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <div style="width:29px;height:29px;background:#1D9E75;border-radius:7px;display:flex;align-items:center;justify-content:center;">
          <span style="color:#fff;font-size:12px;font-weight:700;">✦</span>
        </div>
        <div>
          <div style="font-weight:600;font-size:13px;letter-spacing:-.2px;color:#111;">${t.appName}</div>
          <div style="font-size:9px;color:#aaa;">${t.appTagline}</div>
        </div>
      </div>
      <nav style="display:flex;gap:2px;flex-wrap:wrap;">
        ${t.tabs.map(tab=>`
        <button class="ntab" onclick="setTab('${tab.id}')"
          style="padding:5px 11px;border-radius:7px;font-size:11px;font-weight:500;position:relative;
                 color:${S.tab===tab.id?(tab.id==="settings"?"#334155":"#0F6E56"):"#555"};
                 background:${S.tab===tab.id?(tab.id==="settings"?"#f1f5f9":"#e1f5ee"):"none"};
                 font-family:${t.ff};">
          ${tab.label}
          ${tab.id==="settings"&&cfgChanged?`<span style="position:absolute;top:3px;${t.dir==="rtl"?"left":"right"}:3px;width:6px;height:6px;background:#BA7517;border-radius:50%;"></span>`:""}
        </button>`).join("")}
      </nav>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <button class="cbtn" onclick="openReport()"
          title="${t.dir==="rtl"?"تقرير":"Rapport"}"
          style="padding:5px 9px;border-radius:7px;border:1px solid #d0cec9;background:#fafaf8;
                 font-size:11px;color:#555;font-family:${t.ff};">
          <i class="ti ti-file-download" style="font-size:13px;"></i>
        </button>
        <button class="lbtn cbtn" onclick="toggleLang()"
          style="padding:5px 12px;border-radius:7px;border:1px solid #d0cec9;background:#fafaf8;
                 font-size:11px;font-weight:500;color:#333;font-family:${t.ff};">
          ${t.langToggle}
        </button>
      </div>
    </div>
  </header>
  <main style="max-width:980px;margin:0 auto;padding:1.4rem 1rem 2.5rem;">
    ${S.tab==="ifu"?panelIFU():S.tab==="reel"?panelReel():S.tab==="simp"?panelSimp():panelSettings()}
  </main>
  <footer style="text-align:center;padding:1rem;font-size:11px;color:#bbb;border-top:1px solid #ece9e3;">
    ⚠ ${t.footer}
  </footer>`;

  /* bind inputs */
  on("ifu-ca","input",e=>{S.ifu.ca=e.target.value;S.ifu.err="";S.ifu.res=null;});
  on("ifu-act","change",e=>{S.ifu.act=e.target.value;S.ifu.res=null;});
  on("reel-gross","input",e=>{S.reel.gross=e.target.value;S.reel.err="";S.reel.res=null;});
  on("reel-exp","input",e=>{S.reel.exp=e.target.value;S.reel.res=null;});
  on("reel-ibsact","change",e=>{S.reel.ibsAct=e.target.value;S.reel.res=null;});
  on("simp-rec","input",e=>{S.simp.rec=e.target.value;S.simp.err="";S.simp.res=null;});
  on("simp-exp","input",e=>{S.simp.exp=e.target.value;S.simp.res=null;});

  /* render checklist content if visible */
  if($("exp-checklist-container")) renderExpChecklist();
}

/* ── Global action handlers ── */
function setTab(id){S.tab=id;render();}
function toggleLang(){S.lang=S.lang==="fr"?"ar":"fr";[S.ifu,S.reel,S.simp].forEach(m=>{m.res=null;m.err="";});render();}
function setEntity(v){S.reel.entity=v;S.reel.res=null;render();}
function setSector(v){S.reel.sector=v;S.reel.res=null;render();}
function setAcompteType(v){S.reel.acompteType=v;S.reel.res=null;render();}
function toggleTVA(v){S.reel.tva=v;S.reel.res=null;render();}
function setTvaRate(r){S.reel.tvaRate=r;S.reel.res=null;render();}

/* close modal on backdrop click */
document.getElementById("report-modal").addEventListener("click",function(e){
  if(e.target===this) closeReport();
});

render();
</script>
