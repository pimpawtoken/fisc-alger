const LS_KEY = "fiscalgerie_cfg_v7";

/* ── DEFAULT CONFIG ── */
const DEFAULT_CFG = {
  ifu_min_std:30000, ifu_min_micro:10000,
  ifu_rate_prod:5, ifu_rate_serv:12, ifu_rate_micro:0.5,
  ibs_rate_prod:19, ibs_rate_btp:23, ibs_rate_trade:26,
  tva_normal:19, tva_reduced:9,
  acompte_goods:2, acompte_services:4,
  bnc_rate:19, bnc_min:10000,
  irg:[
    {max:240000,rate:0},{max:480000,rate:23},{max:960000,rate:27},
    {max:1920000,rate:30},{max:3840000,rate:33},{max:Infinity,rate:35},
  ],
};
function cloneCfg(c){return{...c,irg:c.irg.map(b=>({...b}))};}

function loadCfg(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return cloneCfg(DEFAULT_CFG);
    const saved=JSON.parse(raw);
    const merged=cloneCfg(DEFAULT_CFG);
    Object.keys(merged).forEach(k=>{
      if(k==="irg"){
        if(Array.isArray(saved.irg)&&saved.irg.length===merged.irg.length)
          merged.irg=saved.irg.map(b=>({...b,max:b.max==="Infinity"?Infinity:Number(b.max)}));
      } else if(saved[k]!==undefined) merged[k]=saved[k];
    });
    return merged;
  }catch(e){return cloneCfg(DEFAULT_CFG);}
}
function saveCfg(c){
  try{
    const ser={...cloneCfg(c),irg:c.irg.map(b=>({...b,max:b.max===Infinity?"Infinity":b.max}))};
    localStorage.setItem(LS_KEY,JSON.stringify(ser));
  }catch(e){}
}

const initCfg=loadCfg();
let S={
  lang:"fr", tab:"ifu",
  cfg:initCfg, edit:cloneCfg(initCfg), settingsSaved:false,
  ifu:{ca:"", act:"prod", res:null, err:"", overThreshold:false},
  reel:{gross:"", exp:"", entity:"company", ibsAct:"prod19",
        sector:"std", acompteType:"goods", tva:false, tvaRate:"normal", res:null, err:""},

  expChecked:{}, expAmounts:{},
};

/* ── report data cache (populated by calculators) ── */
let reportCache=[];

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
const d=()=>T[S.lang];
const cfg=()=>S.cfg;
const fmt=v=>isNaN(v)||v===null?"—":new Intl.NumberFormat("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(v)+" DA";
const pf=s=>parseFloat(String(s).replace(/\s/g,"").replace(/,/g,"."));
const $=id=>document.getElementById(id);
const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

const ifuActs=()=>[
  {v:"prod", l:`${d().dir==="rtl"?"إنتاج السلع":"Production de biens"} — ${cfg().ifu_rate_prod}%`, r:cfg().ifu_rate_prod/100, micro:false},
  {v:"serv", l:`${d().dir==="rtl"?"الخدمات والتجارة":"Services & Commerce"} — ${cfg().ifu_rate_serv}%`, r:cfg().ifu_rate_serv/100, micro:false},
  {v:"micro",l:`${d().dir==="rtl"?"الاستيراد المصغر":"Micro-Import"} — ${cfg().ifu_rate_micro}%`, r:cfg().ifu_rate_micro/100, micro:true},
];
const ibsActs=()=>[
  {v:"prod19", l:`${d().dir==="rtl"?"إنتاج السلع":"Production"} — ${cfg().ibs_rate_prod}%`,   r:cfg().ibs_rate_prod/100},
  {v:"btp23",  l:`${d().dir==="rtl"?"البناء والسياحة":"BTP & Tourisme"} — ${cfg().ibs_rate_btp}%`, r:cfg().ibs_rate_btp/100},
  {v:"trade26",l:`${d().dir==="rtl"?"التجارة والخدمات":"Commerce"} — ${cfg().ibs_rate_trade}%`, r:cfg().ibs_rate_trade/100},
];

/* ── Expense total ── */
function expTotal(){
  let t=0;
  const cats=d().dir==="rtl"?EXP_AR:EXP_FR;
  cats.forEach(c=>{if(S.expChecked[c.id]){const v=parseFloat(S.expAmounts[c.id]||0);if(!isNaN(v)&&v>0)t+=v;}});
  return t;
}

/* ── IRG progressive ── */
function calcIRG(profit){
  const brackets=cfg().irg;
  let tax=0,prev=0,details=[];
  for(const b of brackets){
    if(profit<=prev) break;
    const safeMax=b.max===Infinity?profit*100:b.max;
    const slice=Math.min(profit,safeMax)-prev;
    const piece=slice*(b.rate/100);
    details.push({label:b.max===Infinity?"∞":fmt(b.max).replace(" DA",""),slice,rate:b.rate,tax:piece});
    tax+=piece; prev=safeMax;
    if(b.max===Infinity) break;
  }
  return{tax,details};
}

/* ═══════════════════════════════
   CALCULATORS
═══════════════════════════════ */
function doIFU(){
  const st=S.ifu,c=cfg(),t=d();
  const v=pf(st.ca);
  st.overThreshold=false;
  if(isNaN(v)||v<0){st.err=t.errPos;st.res=null;return render();}
  /* ── IFU 8M THRESHOLD GUARD ── */
  if(v>IFU_MAX_CA){
    st.overThreshold=true; st.res=null; st.err="";
    return render();
  }
  st.err=""; st.overThreshold=false;
  const act=ifuActs().find(a=>a.v===st.act);
  const MIN=act.micro?c.ifu_min_micro:c.ifu_min_std;
  const raw=v*act.r,final=Math.max(raw,MIN);
  st.res={ca:v,rate:act.r,raw,final,minApplied:raw<MIN,isMicro:act.micro,minAmt:MIN};

  /* cache for report */
  reportCache=reportCache.filter(r=>r.module!=="IFU");
  reportCache.push({module:"IFU",label:t.ifuTitle,rows:[
    [t.lCA, fmt(v)],[t.lRate,(act.r*100).toFixed(2)+"%"],
    [t.lRaw,fmt(raw)],[t.lMin,fmt(MIN)],[t.lFinal,fmt(final)],
  ],note:raw<MIN?(act.micro?t.minMicroNote:t.minStdNote):""});
  render();
}

function doReel(){
  const st=S.reel,c=cfg(),t=d();
  const gr=pf(st.gross),ex=pf(st.exp);
  if(isNaN(gr)||gr<0){st.err=t.errPos;st.res=null;return render();}
  const expenses=isNaN(ex)?0:ex;
  st.err="";
  reportCache=reportCache.filter(r=>r.module!=="REEL");

  if(st.sector==="export"){
    st.res={mode:"export",gr,expenses,profit:gr-expenses};
    reportCache.push({module:"REEL",label:t.reelTitle,rows:[
      [t.lRevenue,fmt(gr)],[t.lExp,fmt(expenses)],[t.lProfit,fmt(gr-expenses)],[t.exportZero,"0 DA"],
    ],note:""});
    return render();
  }

  let acompteAmt=null;
  if(st.sector==="import"){
    acompteAmt=gr*(st.acompteType==="goods"?c.acompte_goods/100:c.acompte_services/100);
  }

  const profit=gr-expenses;
  if(profit<0){
    st.res={mode:"loss",profit,gr,expenses,acompteAmt};
    reportCache.push({module:"REEL",label:t.reelTitle,rows:[
      [t.lRevenue,fmt(gr)],[t.lExp,fmt(expenses)],[t.lProfit,fmt(profit)],
      ...(acompteAmt!=null?[[t.lAcompte,fmt(acompteAmt)]]:[]),
    ],note:t.lossTitle});
    return render();
  }

  let taxRaw=0,ibsRate=0,irgDetails=null;
  if(st.entity==="company"){
    const act=ibsActs().find(a=>a.v===st.ibsAct);
    ibsRate=act.r; taxRaw=profit*ibsRate;
  } else {
    const{tax,details}=calcIRG(profit);
    taxRaw=tax; irgDetails=details;
  }

  const final=Math.max(taxRaw,c.ifu_min_std);
  let tvaAmt=null;
  if(st.tva){tvaAmt=gr*(st.tvaRate==="normal"?c.tva_normal/100:c.tva_reduced/100);}

  st.res={mode:"normal",gr,expenses,profit,ibsRate,taxRaw,final,
          minApplied:taxRaw<c.ifu_min_std,irgDetails,tvaAmt,acompteAmt,entity:st.entity};

  const rows=[[t.lRevenue,fmt(gr)],[t.lExp,fmt(expenses)],[t.lProfit,fmt(profit)],
              [t.lTaxRate,st.entity==="company"?(ibsRate*100).toFixed(0)+"%":"IRG progressif"],
              [t.lTaxRaw,fmt(taxRaw)]];
  if(tvaAmt!=null) rows.push([t.lTvaEst,fmt(tvaAmt)]);
  if(acompteAmt!=null) rows.push([t.lAcompte,fmt(acompteAmt)]);
  rows.push([t.lFinalTax,fmt(final)]);

  reportCache.push({module:"REEL",label:t.reelTitle,rows, note:taxRaw<c.ifu_min_std?t.minStdNote:""});
  render();
}

function doSimp(){
  const st=S.simp,c=cfg(),t=d();
  const rec=pf(st.rec),ex=pf(st.exp);
  if(isNaN(rec)||rec<0){st.err=t.errPos;st.res=null;return render();}
  const expenses=isNaN(ex)?0:ex;
  st.err="";
  
  const net=Math.max(0,rec-expenses);
  const rate=c.bnc_rate/100;
  const taxRaw=net*rate;
  const final=Math.max(taxRaw,c.bnc_min);
  st.res={rec,expenses,net,rate,taxRaw,final,minApplied:taxRaw<c.bnc_min};

  reportCache=reportCache.filter(r=>r.module!=="SIMP");
  reportCache.push({module:"SIMP",label:t.simpTitle,rows:[
    [t.lRec,fmt(rec)],[t.lSimpExp,fmt(expenses)],[t.lNet,fmt(net)],
    [t.lSimpRate,(c.bnc_rate).toFixed(0)+"%"],[t.lTaxRaw,fmt(taxRaw)],[t.lSimpFinal,fmt(final)],
  ],note:taxRaw<c.bnc_min?t.simpMinNote:""});
  render();
}

function buildReportText(){
  if(reportCache.length===0) return d().reportNoData;
  let txt=`========================================\n`;
  txt+=`      ${d().reportTitle}\n`;
  txt+=`========================================\n`;
  txt+=`${d().reportGenerated} : ${new Date().toLocaleString()}\n\n`;
  reportCache.forEach(m=>{
    txt+=`[ ${m.label} ]\n`;
    m.rows.forEach(r=>{txt+=`  ${r[0]} : ${r[1]}\n`;});
    if(m.note) txt+=`  Note : ${m.note}\n`;
    txt+=`----------------------------------------\n`;
  });
  txt+=`\n${d().reportFooter}\n`;
  return txt;
}
function downloadTXT(){
  const str=buildReportText();
  const blob=new Blob([str],{type:"text/plain;charset=utf-8"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=`FiscAlgerie_Report_${new Date().toISOString().slice(0,10)}.txt`;
  link.click();
}
function downloadCSV(){
  if(reportCache.length===0) return alert(d().reportNoData);
  let csv="\uFEFF"; // UTF-8 BOM
  csv+=`"${d().reportTitle}"\n`;
  csv+=`"${d().reportGenerated}","${new Date().toLocaleString()}"\n\n`;
  reportCache.forEach(m=>{
    csv+=`"${m.label}"\n`;
    m.rows.forEach(r=>{csv+=`"${r[0]}","${r[1]}"\n`;});
    if(m.note) csv+=`"${m.note}"\n`;
    csv+=`\n`;
  });
  csv+=`"${d().reportFooter}"\n`;
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=`FiscAlgerie_Report_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

        h+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed #eaeAea;">
              <span style="color:#555;">${r[0]}</span>

            </div>`;
      });

      h+=`</div>`;
    });
    h+=`<div style="font-size:11px;color:#999;text-align:center;margin-top:1.5rem;line-height:1.4;">${d().reportFooter}</div>`;
    content.innerHTML=h;
  }
  $("report-modal").style.display="flex";
}
function closeReport(){$("report-modal").style.display="none";}

/* ═══════════════════════════════
   SETTINGS LOGIC
═══════════════════════════════ */
function changeCfgInput(key,val,idx=null){
  const n=Number(val);
  if(isNaN(n))return;
  if(idx!==null){S.edit.irg[idx].rate=n;}
  else if(key.startsWith("irg_max_")){
    const i=parseInt(key.split("_")[2]);
    S.edit.irg[i].max=n;
  }else{S.edit[key]=n;}
}
function applySettings(e){
  e.preventDefault();
  S.cfg=cloneCfg(S.edit);
  saveCfg(S.cfg);
  S.settingsSaved=true;
  [S.ifu,S.reel,S.simp].forEach(m=>{m.res=null;m.err="";});
  S.ifu.overThreshold=false;
  reportCache=[];
  render();
  setTimeout(()=>{S.settingsSaved=false;render();},2500);
}
function resetSettings(){
  if(confirm(d().dir==="rtl"?"هل أنت متأكد من إعادة التعيين؟":"Reset to defaults?")){
    S.cfg=cloneCfg(DEFAULT_CFG);
    S.edit=cloneCfg(DEFAULT_CFG);
    saveCfg(S.cfg);
    [S.ifu,S.reel,S.simp].forEach(m=>{m.res=null;m.err="";});
    S.ifu.overThreshold=false;
    reportCache=[];
    render();
  }
}

/* ═══════════════════════════════
   EXPENSE ASSISTANT UI
═══════════════════════════════ */
function toggleExpCheck(id){
  S.expChecked[id]=!S.expChecked[id];
  renderExpChecklist();
}
function changeExpAmt(id,val){
  S.expAmounts[id]=val;
  renderExpChecklist();
}
function applyExpToChecklist(){
  S.reel.exp=String(expTotal());
  S.reel.res=null;
  render();
  const el=$("reel-exp"); if(el)el.focus();
}
function resetExpChecklist(){
  S.expChecked={}; S.expAmounts={};
  renderExpChecklist();
}
function renderExpChecklist(){
  const t=d();
  const container=$("exp-checklist-container");
  if(!container)return;
  const cats=t.dir==="rtl"?EXP_AR:EXP_FR;
  let h=`<div style="margin-top:.75rem;">`;
  cats.forEach(c=>{
    const checked=!!S.expChecked[c.id];
    const val=S.expAmounts[c.id]||"";
    h+=`<div class="exp-row">
          <label style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;font-size:12px;font-weight:500;color:#333;">
            <input type="checkbox" ${checked?"checked":""} onchange="toggleExpCheck('${c.id}')">
            <i class="${c.icon}" style="color:#1D9E75;font-size:15px;"></i>
            <span>${c.label}</span>
          </label>
          <input type="number" placeholder="0" class="exp-amt" value="${val}" 
            ${checked?"":"disabled"} oninput="changeExpAmt('${c.id}',this.value)">
        </div>`;
  });
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;background:#e1f5ee;padding:12px;border-radius:8px;margin-top:12px;">
        <span style="font-size:12px;font-weight:600;color:#0F6E56;">${t.expCheckTotal}:</span>
        <span style="font-family:'DM Mono',monospace;font-weight:600;color:#1D9E75;font-size:14px;">${fmt(expTotal())}</span>
      </div>`;
  h+=`<div style="display:flex;gap:.5rem;margin-top:.75rem;">
        <button onclick="applyExpToChecklist()" class="cbtn" style="flex:2;background:#1D9E75;color:#fff;padding:8px;border-radius:6px;font-size:12px;font-weight:600;">${t.expCheckApply}</button>
        <button onclick="resetExpChecklist()" class="cbtn" style="flex:1;background:#fff;border:1px solid #ddd;color:#666;padding:8px;border-radius:6px;font-size:12px;">${t.expCheckReset}</button>
      </div>`;
  h+=`</div>`;
  container.innerHTML=h;
}

                      <span>${t.cfgBracket} ${idx+1} (→ ${b.label}) :</span>
                      <span style="font-family:'DM Mono',monospace;">${b.rate}% = ${fmt(b.tax).replace(" DA","")}</span>
                    </div>
                  `).join("")}
                </div>
              `:""}
            `:""}

            ${st.sector==="import"?`
              <div style="font-size:10px;color:#1e53a9;background:#eff6ff;border:1px solid #bfdbfe;padding:8px;border-radius:6px;margin-top:10px;line-height:1.3;">
                <strong>${t.importTipTitle} :</strong> ${t.importTipMsg}
              </div>
            `:""}
          </div>
        `:`
          <div style="background:#fafaf8;border:1px dashed #ddd;border-radius:12px;padding:2.5rem 1rem;text-align:center;color:#777;font-size:12px;margin-bottom:1rem;font-weight:500;">
            <i class="ti-click" style="font-size:24px;color:#ccc;display:block;margin-bottom:6px;"></i>${t.emptyHint}
          </div>
        `}

        <div style="background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;">
          <h3 style="font-size:13px;font-weight:600;color:#333;margin-bottom:1rem;display:flex;align-items:center;gap:6px;">
            <i class="ti-timeline" style="color:#1e40af;font-size:16px;"></i>${t.reelRoadTitle}
          </h3>
          ${t.reelRoad.map(r=>`
            <div style="display:flex;gap:10px;margin-bottom:.9rem;">
              <div style="background:${r.c}12;color:${r.c};width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">
                <i class="${r.icon}" style="font-size:14px;"></i>
              </div>
              <div>
                <h4 style="font-size:12px;font-weight:600;color:#222;margin-bottom:1px;">${r.title}</h4>
                <p style="font-size:11px;color:#666;line-height:1.4;">${r.desc}</p>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
    `;
  }

  /* ────────────────────────────────────────────────────────
     TAB: SIMPLIFIED RÉGIME BNC
     ──────────────────────────────────────────────────────── */
  else if(S.tab==="simp"){
    const st=S.simp;
    h+=`
    <div class="g2">
      <div style="background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;box-shadow:0 4px 12px rgba(0,0,0,.01);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;">
          <span class="tag" style="background:#f3e8ff;color:#6b21a8;">${t.simpBadge}</span>
          <span style="font-size:11px;color:#888;font-weight:500;">${t.simpSub}</span>
        </div>
        <h2 style="font-size:15px;font-weight:600;color:#111;margin-bottom:.4rem;">${t.simpTitle}</h2>
        <p style="font-size:11px;color:#666;margin-bottom:1.25rem;line-height:1.4;">${t.simpDesc}</p>

        <div style="margin-bottom:1rem;">
          <label style="display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:5px;">${t.recLbl}</label>
          <input type="text" id="simp-rec" class="cfg-input" placeholder="${t.recPh}" value="${st.rec}" style="font-family:'DM Mono',monospace;">
          ${st.err?`<div style="color:#c81e1e;font-size:11px;margin-top:4px;">${st.err}</div>`:""}
        </div>

        <div style="margin-bottom:1.25rem;">
          <label style="display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:5px;">${t.simpExpLbl}</label>
          <input type="text" id="simp-exp" class="cfg-input" placeholder="${t.simpExpPh}" value="${st.exp}" style="font-family:'DM Mono',monospace;">
        </div>

        <button onclick="doSimp()" class="cbtn" style="width:100%;background:#6b21a8;color:#fff;padding:10px;border-radius:8px;font-size:13px;font-weight:600;">
          <i class="ti-calculator" style="margin-inline-end:4px;"></i>${t.simpCalcBtn}
        </button>

        <div style="background:#fbfbfe;border:1px solid #e0e7ff;border-radius:10px;padding:12px;margin-top:1.25rem;">
          <div style="font-size:12px;font-weight:600;color:#4338ca;margin-bottom:4px;">${t.focusTitle}</div>
          <p style="font-size:11px;color:#4f46e5;margin-bottom:8px;">${t.focusDesc}</p>
          <div style="font-size:11px;font-weight:600;color:#444;margin-bottom:3px;">${t.focusProfsLbl} :</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">
            ${t.focusProfs.map(p=>`<span style="background:#e0e7ff;color:#3730a3;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;">${p}</span>`).join("")}
          </div>
          ${t.focusSteps.map(s=>`
            <div style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-start;">
              <i class="${s.icon}" style="color:#4f46e5;font-size:13px;margin-top:2px;"></i>
              <div style="font-size:10px;color:#555;line-height:1.3;"><strong>${s.title} :</strong> ${s.desc}</div>
            </div>
          `).join("")}
        </div>
      </div>

      <div>
        ${st.res?`
          <div style="background:#fff;border:1px solid #6b21a8;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 4px 12px rgba(107,33,168,.04);">
            <h3 style="font-size:13px;font-weight:600;color:#6b21a8;margin-bottom:1rem;border-bottom:1px dashed #f3e8ff;padding-bottom:6px;">${t.results}</h3>
            <div class="rrow"><span>${t.lRec}</span><b style="font-family:'DM Mono',monospace;">${fmt(st.res.rec)}</b></div>
            <div class="rrow"><span>${t.lSimpExp}</span><b style="font-family:'DM Mono',monospace;color:#a32d2d;">${fmt(st.res.expenses)}</b></div>
            <div class="rrow"><span>${t.lNet}</span><b style="font-family:'DM Mono',monospace;color:#1d9e75;">${fmt(st.res.net)}</b></div>
            <div class="rrow"><span>${t.lSimpRate}</span><b style="color:#6b21a8;">${(st.res.rate*100).toFixed(0)}%</b></div>
            <div class="rrow"><span>${t.lTaxRaw}</span><b style="font-family:'DM Mono',monospace;color:#555;">${fmt(st.res.taxRaw)}</b></div>
            <div class="rrow" style="font-size:14px;font-weight:bold;border-top:1px solid #6b21a8;padding-top:10px;margin-top:5px;">
              <span style="color:#111;">${t.lSimpFinal}</span>
              <span style="color:#6b21a8;font-family:'DM Mono',monospace;">${fmt(st.res.final)}</span>
            </div>
            ${st.res.minApplied?`<div style="background:#fff9f0;color:#b45309;font-size:11px;padding:8px;border-radius:6px;margin-top:10px;font-weight:500;">💡 ${t.simpMinNote}</div>`:""}
          </div>
        `:`
          <div style="background:#fafaf8;border:1px dashed #ddd;border-radius:12px;padding:2.5rem 1rem;text-align:center;color:#777;font-size:12px;margin-bottom:1rem;font-weight:500;">
            <i class="ti-click" style="font-size:24px;color:#ccc;display:block;margin-bottom:6px;"></i>${t.emptyHint}
          </div>
        `}

        <div style="background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;">
          <h3 style="font-size:13px;font-weight:600;color:#333;margin-bottom:1rem;display:flex;align-items:center;gap:6px;">
            <i class="ti-route" style="color:#6b21a8;font-size:16px;"></i>${t.simpRoadTitle}
          </h3>
          ${t.simpRoad.map(r=>`
            <div style="display:flex;gap:10px;margin-bottom:.9rem;">
              <div style="background:${r.c}12;color:${r.c};width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">
                <i class="${r.icon}" style="font-size:14px;"></i>
              </div>
              <div>
                <h4 style="font-size:12px;font-weight:600;color:#222;margin-bottom:1px;">${r.title}</h4>
                <p style="font-size:11px;color:#666;line-height:1.4;">${r.desc}</p>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
    `;
  }

  /* ────────────────────────────────────────────────────────
     TAB: DYNAMIC SETTINGS CONFIGURATION
     ──────────────────────────────────────────────────────── */
  else if(S.tab==="settings"){
    const ed=S.edit;
    h+=`
    <form onsubmit="applySettings(e)" style="background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;box-shadow:0 4px 12px rgba(0,0,0,.01);">
      <h2 style="font-size:15px;font-weight:600;color:#111;margin-bottom:2px;">${t.settingsTitle}</h2>
      <p style="font-size:11px;color:#666;margin-bottom:1rem;line-height:1.4;">${t.settingsSubtitle}</p>

      ${S.settingsSaved?`<div style="background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;padding:10px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:1rem;">${t.settingsSaved}</div>`:""}
      <div style="background:#fffbeb;border:1px solid #fef3c7;color:#92400e;padding:8px 10px;border-radius:8px;font-size:11px;margin-bottom:1.25rem;line-height:1.4;">${t.cfgWarning}</div>

      <div class="g2">
        <div>
          <h3 style="font-size:12px;font-weight:bold;color:#1D9E75;margin-bottom:.65rem;border-bottom:1px solid #eee;padding-bottom:4px;">${t.cfgIFU}</h3>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIFUMin30}</label>
            <input type="number" class="cfg-input" value="${ed.ifu_min_std}" oninput="changeCfgInput('ifu_min_std',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIFUMin10}</label>
            <input type="number" class="cfg-input" value="${ed.ifu_min_micro}" oninput="changeCfgInput('ifu_min_micro',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIFURateProd}</label>
            <input type="number" step="0.1" class="cfg-input" value="${ed.ifu_rate_prod}" oninput="changeCfgInput('ifu_rate_prod',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIFURateServ}</label>
            <input type="number" step="0.1" class="cfg-input" value="${ed.ifu_rate_serv}" oninput="changeCfgInput('ifu_rate_serv',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIFURateMicro}</label>
            <input type="number" step="0.1" class="cfg-input" value="${ed.ifu_rate_micro}" oninput="changeCfgInput('ifu_rate_micro',this.value)">
          </div>

          <h3 style="font-size:12px;font-weight:bold;color:#6b21a8;margin-bottom:.65rem;border-bottom:1px solid #eee;padding-bottom:4px;margin-top:1.25rem;">${t.cfgBNC}</h3>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgBNCRate}</label>
            <input type="number" class="cfg-input" value="${ed.bnc_rate}" oninput="changeCfgInput('bnc_rate',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgBNCMin}</label>
            <input type="number" class="cfg-input" value="${ed.bnc_min}" oninput="changeCfgInput('bnc_min',this.value)">
          </div>
        </div>

        <div>
          <h3 style="font-size:12px;font-weight:bold;color:#1e40af;margin-bottom:.65rem;border-bottom:1px solid #eee;padding-bottom:4px;">${t.cfgIBS}</h3>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIBSProd}</label>
            <input type="number" class="cfg-input" value="${ed.ibs_rate_prod}" oninput="changeCfgInput('ibs_rate_prod',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIBSBtp}</label>
            <input type="number" class="cfg-input" value="${ed.ibs_rate_btp}" oninput="changeCfgInput('ibs_rate_btp',this.value)">
          </div>
          <div style="margin-bottom:.75rem;">
            <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgIBSTrade}</label>
            <input type="number" class="cfg-input" value="${ed.ibs_rate_trade}" oninput="changeCfgInput('ibs_rate_trade',this.value)">
          </div>

          <h3 style="font-size:12px;font-weight:bold;color:#6d28d9;margin-bottom:.65rem;border-bottom:1px solid #eee;padding-bottom:4px;margin-top:1rem;">${t.cfgTVA}</h3>
          <div class="g2h" style="margin-bottom:.75rem;">
            <div>
              <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgTVANormal}</label>
              <input type="number" class="cfg-input" value="${ed.tva_normal}" oninput="changeCfgInput('tva_normal',this.value)">
            </div>
            <div>
              <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.cfgTVAReduced}</label>
              <input type="number" class="cfg-input" value="${ed.tva_reduced}" oninput="changeCfgInput('tva_reduced',this.value)">
            </div>
          </div>

          <h3 style="font-size:12px;font-weight:bold;color:#b45309;margin-bottom:.65rem;border-bottom:1px solid #eee;padding-bottom:4px;margin-top:1rem;">${t.cfgAcompte}</h3>
          <div class="g2h" style="margin-bottom:.75rem;">
            <div>
              <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.acompteGoods}</label>
              <input type="number" class="cfg-input" value="${ed.acompte_goods}" oninput="changeCfgInput('acompte_goods',this.value)">
            </div>
            <div>
              <label style="display:block;font-size:11px;color:#555;margin-bottom:3px;">${t.acompteServices}</label>
              <input type="number" class="cfg-input" value="${ed.acompte_services}" oninput="changeCfgInput('acompte_services',this.value)">
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top:1.25rem;background:#fafaf8;padding:12px;border-radius:10px;border:1px solid #eee;">
        <h3 style="font-size:12px;font-weight:bold;color:#111;margin-bottom:3px;">${t.cfgIRG}</h3>
        <p style="font-size:10px;color:#666;margin-bottom:10px;">${t.cfgIRGDesc}</p>
        <div style="display:grid;grid-template-columns:1fr 2fr 1fr;gap:.5rem;margin-bottom:5px;font-size:11px;font-weight:600;color:#666;padding:0 4px;">
          <span>${t.cfgBracket}</span><span>${t.cfgUpTo}</span><span>${t.cfgRate}</span>
        </div>
        ${ed.irg.map((bracket,i)=>`
          <div style="display:grid;grid-template-columns:1fr 2fr 1fr;gap:.5rem;margin-bottom:6px;align-items:center;">
            <span style="font-size:11px;font-weight:600;color:#444;padding:0 4px;"># ${i+1}</span>
            <input type="text" class="cfg-input" style="font-family:'DM Mono',monospace;"
              value="${bracket.max===Infinity?t.cfgInfinity:bracket.max}" 
              ${bracket.max===Infinity?"disabled":""}
              oninput="changeCfgInput('irg_max_${i}', this.value)">
            <input type="number" class="cfg-input" style="font-family:'DM Mono',monospace;" value="${bracket.rate}" oninput="changeCfgInput('irg_rate', this.value, ${i})">
          </div>
        `).join("")}
      </div>

      <div style="margin-top:1.5rem;display:flex;gap:.75rem;flex-wrap:wrap;">
        <button type="button" onclick="applySettings(event)" class="cbtn" style="flex:2;min-width:180px;background:#1D9E75;color:#fff;padding:11px;border-radius:8px;font-size:13px;font-weight:600;">
          ✕ ${t.settingsSave}
        </button>
        <button type="button" onclick="resetSettings()" class="cbtn" style="flex:1;min-width:140px;background:#fff;border:1px solid #ddd;color:#666;padding:11px;border-radius:8px;font-size:12px;">
          ${t.settingsReset}
        </button>
      </div>
      <div style="font-size:10px;color:#777;text-align:center;margin-top:10px;">${t.lsNote}</div>
    </form>
    `;
  }

  /* Footer layout component */
  h+=`
  </div>
  <footer style="background:#fafaf8;border-top:1px solid #eee;padding:1.5rem 1rem;margin-top:3rem;text-align:center;">
    <div style="max-width:1100px;margin:0 auto;">
      <p style="font-size:11px;color:#777;line-height:1.5;margin-bottom:4px;">${t.footer}</p>
      <p style="font-size:10px;color:#aaa;font-weight:500;">&copy; 2026 FiscAlgérie — v7.0.0. All rights reserved.</p>
    </div>
  </footer>
  `;

  $("app").innerHTML=h;

  /* Re-attach input event handlers dynamically after rendering innerHTML components */
  on("ifu-ca","input",e=>{
    S.ifu.ca=e.target.value; S.ifu.err=""; S.ifu.res=null;
    const v=pf(S.ifu.ca);
    const wasOver=S.ifu.overThreshold;
    S.ifu.overThreshold=(!isNaN(v)&&v>IFU_MAX_CA);
    if(S.ifu.overThreshold!==wasOver) render();
  });
  on("ifu-act","change",e=>{S.ifu.act=e.target.value;S.ifu.res=null;});
  on("reel-gross","input",e=>{S.reel.gross=e.target.value;S.reel.err="";S.reel.res=null;});
  on("reel-exp","input",e=>{S.reel.exp=e.target.value;S.reel.res=null;});
  on("reel-ibsact","change",e=>{S.reel.ibsAct=e.target.value;S.reel.res=null;});
  on("simp-rec","input",e=>{S.simp.rec=e.target.value;S.simp.err="";S.simp.res=null;});
  on("simp-exp","input",e=>{S.simp.exp=e.target.value;S.simp.res=null;});

  if($("exp-checklist-container")) renderExpChecklist();
}

/* ── Global handlers ── */
function setTab(id){S.tab=id;render();}
function toggleLang(){
  S.lang=S.lang==="fr"?"ar":"fr";
  [S.ifu,S.reel,S.simp].forEach(m=>{m.res=null;m.err="";});
  S.ifu.overThreshold=false; reportCache=[];
  render();
}

/* Initial dynamic application draw execution bootstrapper */
render();
</script>
